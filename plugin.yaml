name: xwecom-platform
label: XWeCom (企业微信 · Official SDK)
kind: platform
version: 1.0.0
description: >
  WeCom (Enterprise WeChat) gateway adapter for Hermes Agent, powered by
  the official wecom-aibot-python-sdk-async. Provides stable WebSocket
  connectivity, streaming replies, and media handling via the official
  protocol implementation maintained by the Tencent WeCom team.
author: crazyhulk
requires_env:
  - name: XWECOM_BOT_ID
    description: "WeCom Smart Robot bot ID"
    prompt: "XWeCom bot ID"
    password: false
  - name: XWECOM_SECRET
    description: "WeCom Smart Robot secret"
    prompt: "XWeCom secret"
    password: true
optional_env:
  - name: XWECOM_WEBSOCKET_URL
    description: "WeCom WebSocket URL (default: wss://openws.work.weixin.qq.com)"
    prompt: "WebSocket URL"
    password: false
  - name: XWECOM_HOME_CHANNEL
    description: "Default chat ID for cron / notification delivery"
    prompt: "Home channel chat ID"
    password: false
  - name: XWECOM_HOME_CHANNEL_NAME
    description: "Display name for the home channel"
    prompt: "Home channel name"
    password: false
  - name: XWECOM_ALLOWED_USERS
    description: "Comma-separated WeCom user IDs allowed to talk to the bot"
    prompt: "Allowed users (comma-separated, or * for all)"
    password: false
  - name: XWECOM_ALLOW_ALL_USERS
    description: "Set to 'true' to allow all users (overrides ALLOWED_USERS)"
    prompt: "Allow all users (true/false)"
    password: false
  - name: XWECOM_CALLBACK_ENABLED
    description: "Enable optional self-built app HTTP callback listener"
    prompt: "Enable callback listener (true/false)"
    password: false
  - name: XWECOM_CALLBACK_HOST
    description: "Callback listener bind host (default: 0.0.0.0)"
    prompt: "Callback host"
    password: false
  - name: XWECOM_CALLBACK_PORT
    description: "Callback listener port (default: 8645)"
    prompt: "Callback port"
    password: false
  - name: XWECOM_CALLBACK_PATH
    description: "Callback listener path (default: /wecom/callback)"
    prompt: "Callback path"
    password: false
  - name: XWECOM_CORP_ID
    description: "WeCom CorpID for self-built app callbacks"
    prompt: "WeCom CorpID"
    password: false
  - name: XWECOM_CORP_SECRET
    description: "WeCom CorpSecret for callback-mode proactive replies"
    prompt: "WeCom CorpSecret"
    password: true
  - name: XWECOM_AGENT_ID
    description: "WeCom self-built app AgentId for callback-mode proactive replies"
    prompt: "WeCom AgentId"
    password: false
  - name: XWECOM_CALLBACK_TOKEN
    description: "WeCom callback token"
    prompt: "Callback token"
    password: true
  - name: XWECOM_ENCODING_AES_KEY
    description: "WeCom callback EncodingAESKey"
    prompt: "EncodingAESKey"
    password: true
